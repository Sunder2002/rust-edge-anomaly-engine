name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  # This tells the compiler where to find the 'translator' (libclang)
  LIBCLANG_PATH: /usr/lib/llvm-14/lib 

jobs:
  check:
    name: Verify Code Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            clang \
            libclang-dev \
            libopencv-dev \
            pkg-config

      - name: Cargo Check
        run: cargo check