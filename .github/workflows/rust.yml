name: Rust CI

on: [push, pull_request]

jobs:
  check:
    name: Verify Code Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libopencv-dev clang pkg-config
      - name: Cargo Check
        run: cargo check